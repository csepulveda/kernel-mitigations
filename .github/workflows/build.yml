name: Build and Push

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-west-1
  IMAGE_NAME: r2-kernel-mitigations

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Configure AWS credentials
        run: |
          aws configure set default.region ${{ env.AWS_REGION }}
          aws configure set aws_access_key_id ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws configure set aws_secret_access_key ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Login to ECR
        run: |
          AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query "Account" --output text)
          DOCKER_REGISTRY="${AWS_ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"
          aws ecr get-login-password | docker login --username AWS --password-stdin $DOCKER_REGISTRY
          echo "DOCKER_REGISTRY=${DOCKER_REGISTRY}" >> $GITHUB_ENV

      - name: Create ECR repository if not exists
        run: |
          aws ecr describe-repositories --repository-names ${{ env.IMAGE_NAME }} 2>/dev/null || \
          aws ecr create-repository --repository-name ${{ env.IMAGE_NAME }} \
            --image-scanning-configuration scanOnPush=true \
            --encryption-configuration encryptionType=AES256

      - name: Build and push
        run: |
          IMAGE="${DOCKER_REGISTRY}/${{ env.IMAGE_NAME }}"
          TAG="${GITHUB_SHA::8}"
          docker build -t "${IMAGE}:${TAG}" -t "${IMAGE}:latest" .
          docker push "${IMAGE}:${TAG}"
          docker push "${IMAGE}:latest"
          echo "IMAGE_TAG=${TAG}" >> $GITHUB_ENV
          echo "Pushed: ${IMAGE}:${TAG}"
