name: Update Chart Image Tag

on:
  workflow_run:
    workflows: ["Build and Push"]
    types: [completed]
    branches: [main]

permissions:
  contents: write

jobs:
  update-chart:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get image tag from triggering run
        run: |
          TAG="${{ github.event.workflow_run.head_sha }}"
          echo "IMAGE_TAG=${TAG::8}" >> $GITHUB_ENV

      - name: Update values.yaml
        run: |
          sed -i "s/^  tag: .*/  tag: \"${IMAGE_TAG}\"/" chart/values.yaml
          echo "Updated chart/values.yaml → tag: ${IMAGE_TAG}"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add chart/values.yaml
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: update image tag to ${IMAGE_TAG}"
          git push
